name: Release

on:
  push:
    branches:
      - main

# Required so the action can:
#   contents: write       -> create release tags / GitHub releases
#   pull-requests: write  -> open / update the "Version Packages" PR
#   id-token: write       -> npm trusted publishing (OIDC)
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # Runs `npm run version` when opening/updating the PR (consumes
          # changesets, bumps package.json, updates CHANGELOG.md).
          version: npm run version
          # Runs `npm run release` after the version PR is merged
          # (build + `changeset publish` -> npm publish + git tag).
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
