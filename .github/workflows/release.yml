name: Release

on:
  push:
    branches:
      - main

# Required so the action can:
#   contents: write       -> create release tags / GitHub releases
#   pull-requests: write  -> open / update the "Version Packages" PR
#   id-token: write       -> npm trusted publishing (OIDC)
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
    with:
      node-version: '20.x'

  release:
    name: Release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Create release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d  # v1.9.0
        with:
          # Runs `npm run changeset:version` when opening/updating the PR
          # (consumes changesets, bumps package.json, updates CHANGELOG.md).
          # Note: avoid naming this script `version` -- npm treats `version` as
          # a lifecycle hook for `npm version`, which would silently invoke
          # changesets on local `npm version <type>` calls.
          version: npm run changeset:version
          # Runs `npm run release` after the version PR is merged
          # (build + `changeset publish` -> npm publish + git tag).
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
